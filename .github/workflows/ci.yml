name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend (.NET) – build & tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore backend/KamuAudit.Api/KamuAudit.Api.csproj

      - name: Build
        run: dotnet build backend/KamuAudit.Api/KamuAudit.Api.csproj --no-restore -c Release

      - name: Test
        run: |
          if [ -d backend/KamuAudit.Tests ]; then
            dotnet test backend/KamuAudit.Tests/KamuAudit.Tests.csproj -c Release --no-build --verbosity normal;
          else
            echo "No backend test project found, skipping tests";
          fi

      - name: Upload test artifacts (backend)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-artifacts
          path: |
            **/TestResults/*
          if-no-files-found: ignore

  runner:
    name: Runner (Node + Playwright) – lint & tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: runner
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: "runner/.nvmrc"
          cache: "npm"
          cache-dependency-path: "runner/package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit & integration tests
        run: npm test

      - name: Upload test artifacts (runner)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runner-test-artifacts
          path: |
            test-results/**
            reports/runs/**
          if-no-files-found: ignore

  frontend:
    name: Frontend – lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: "runner/.nvmrc"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  security-audit:
    name: Dependency Security Audit (report-only)
    runs-on: ubuntu-latest
    needs: [backend, runner]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore backend
        working-directory: backend/KamuAudit.Api
        run: dotnet restore

      - name: List vulnerable .NET packages (report-only)
        working-directory: backend/KamuAudit.Api
        run: dotnet list package --vulnerable --include-transitive
        continue-on-error: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: "runner/.nvmrc"
          cache: "npm"
          cache-dependency-path: "runner/package-lock.json"

      - name: Install runner dependencies
        working-directory: runner
        run: npm ci

      - name: Run npm audit (high and above, report-only)
        working-directory: runner
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Summarize security audit
        if: always()
        run: |
          {
            echo "## Dependency Security Audit (report-only)";
            echo "";
            echo "- .NET: \`dotnet list package --vulnerable --include-transitive\` has been executed.";
            echo "- Node: \`npm audit --audit-level=high\` has been executed for the runner.";
            echo "";
            echo "> CI currently does **not** fail on these checks by default. Failing policy can be enabled later";
            echo "> based on severity/age thresholds defined in security governance.";
          } >> "$GITHUB_STEP_SUMMARY"

