name: Backend CI

on:
  push:
    branches: [main, master]
    paths:
      - 'backend/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'backend/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore backend/KamuAudit.Api/KamuAudit.Api.csproj

      - name: Build
        run: dotnet build backend/KamuAudit.Api/KamuAudit.Api.csproj --no-restore -c Release

      - name: Test
        run: |
          if [ -d backend/KamuAudit.Tests ]; then
            dotnet build backend/KamuAudit.Tests/KamuAudit.Tests.csproj -c Release --no-restore;
            dotnet test backend/KamuAudit.Tests/KamuAudit.Tests.csproj -c Release --no-build --verbosity normal;
          else
            echo "No test project found, skipping tests";
          fi

  integration:
    runs-on: ubuntu-latest
    needs: build-and-test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kamu_audit_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      ConnectionStrings__Default: 'Host=localhost;Port=5432;Database=kamu_audit_test;Username=postgres;Password=postgres'
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore backend/KamuAudit.Api/KamuAudit.Api.csproj

      - name: Build
        run: dotnet build backend/KamuAudit.Api/KamuAudit.Api.csproj --no-restore -c Release

      - name: Run migrations
        run: dotnet ef database update --project backend/KamuAudit.Api/KamuAudit.Api.csproj --no-build -c Release
        env:
          ConnectionStrings__Default: 'Host=localhost;Port=5432;Database=kamu_audit_test;Username=postgres;Password=postgres'
